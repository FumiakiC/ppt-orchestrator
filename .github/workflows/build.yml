name: Build and Package PPT-Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# デフォルトの権限を最小限（読み取り専用）に設定
permissions:
  contents: read

jobs:
  # 1. ビルドとパッケージングの検証ジョブ（PR時も実行されるが、権限はreadのみ）
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Build Script
        shell: pwsh
        run: |
          ./build/build.ps1

      - name: Package files into ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force | Out-Null
          Copy-Item -Path Start-Presenter.bat -Destination package/
          Copy-Item -Path README.md -Destination package/

          New-Item -ItemType Directory -Path package/dist -Force | Out-Null
          Copy-Item -Path dist/presentation-controller.ps1 -Destination package/dist/

          Compress-Archive -Path package/* -DestinationPath ppt-orchestrator-ready-to-use.zip -Force
          Write-Host "✅ Created ppt-orchestrator-ready-to-use.zip" -ForegroundColor Green

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ppt-orchestrator-package
          path: ppt-orchestrator-ready-to-use.zip
          retention-days: 90

  # 2. リリース公開ジョブ（mainマージ時のみ実行され、書き込み権限を持つ）
  release:
    needs: build-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    # このジョブにのみ書き込み権限を付与
    permissions:
      contents: write

    env:
      # メジャー.マイナー。新しいマイナーを切るときはここだけ変更（patch は自動で 0 始まり）
      MAJOR_MINOR: "1.1"

    steps:
      - name: Download built ZIP
        uses: actions/download-artifact@v4
        with:
          name: ppt-orchestrator-package

      - name: Determine next version (patch resets per minor)
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mm_re=$(printf '%s' "$MAJOR_MINOR" | sed 's/\./\\./g')
          existing=$(gh api "repos/${{ github.repository }}/tags" --paginate --jq '.[].name' \
            | grep -E "^v${mm_re}\.[0-9]+$" || true)
          if [ -z "$existing" ]; then
            patch=0
          else
            max=$(printf '%s\n' "$existing" | sed -E "s/^v${mm_re}\.//" | sort -n | tail -1)
            patch=$((max + 1))
          fi
          version="v${MAJOR_MINOR}.${patch}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Next version: $version"

      - name: Create GitHub Release and Upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: Release ${{ steps.ver.outputs.version }}
          body: |
            ## 🎭 PPT-Orchestrator 最新自動ビルドパッケージ
            コミット `${{ github.sha }}` から自動生成された製品版パッケージです。

            ### 📦 含まれるファイル / Included Files
            - `Start-Presenter.bat` (管理者権限・ネットワーク自動設定ランチャー)
            - `dist/presentation-controller.ps1` (堅牢化・XSS対策適用済み本体スクリプト)
            - `README.md` (取扱説明書)

            ### 🚀 使い方 / How to Use
            1. 下記の **`ppt-orchestrator-ready-to-use.zip`** をダウンロードします。
            2. ダウンロードしたZIPファイルを任意の場所へ解凍（展開）します。
            3. 解凍してできたフォルダー内に、本番で使用する PowerPoint ファイル（`.pptx`）を入れます。
            4. **`Start-Presenter.bat`** をダブルクリックして起動します。
          files: ppt-orchestrator-ready-to-use.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
